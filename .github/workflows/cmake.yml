name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-vs2022:
    name: VS2022/v143 ${{ matrix.arch }} ${{ matrix.config }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, x64, ARM, ARM64]
        config: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Ensure WDK for x86/ARM32 driver build
        if: ${{ matrix.arch == 'x86' || matrix.arch == 'ARM' }}
        shell: pwsh
        run: ./scripts/nuget/Ensure-LdkWdk.ps1 -WindowsSdkVersion '10.0.22621.0' -RequiredPlatforms '${{ matrix.arch }}'

      - name: Build library
        shell: cmd
        run: build.bat . ${{ matrix.arch }} ${{ matrix.config }}

      - name: Build test driver
        shell: cmd
        working-directory: test
        run: ..\build.bat . ${{ matrix.arch }} ${{ matrix.config }}

      - name: Stage release artifact
        if: ${{ matrix.config == 'Release' }}
        shell: pwsh
        run: |
          $stage = Join-Path $env:RUNNER_TEMP "ldk-${{ matrix.arch }}"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item -Recurse -Path "include" -Destination (Join-Path $stage "include")
          New-Item -ItemType Directory -Force -Path (Join-Path $stage "lib") | Out-Null
          Copy-Item -Recurse -Path "lib\${{ matrix.arch }}" -Destination (Join-Path $stage "lib")
          Copy-Item -Path "README.md", "LICENSE" -Destination $stage
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          Compress-Archive -Path (Join-Path $stage "*") -DestinationPath "dist\ldk-${{ matrix.arch }}.zip" -Force

      - name: Upload release artifact
        if: ${{ matrix.config == 'Release' }}
        uses: actions/upload-artifact@v7
        with:
          name: ldk-${{ matrix.arch }}
          path: dist/ldk-${{ matrix.arch }}.zip

  build-vs2019:
    name: VS2019/v142 ${{ matrix.arch }} ${{ matrix.config }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, x64, ARM, ARM64]
        config: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show v142 toolchain
        shell: pwsh
        run: |
          cmake --version

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installationPath = & $vswhere -latest -products * -property installationPath
          Write-Host "Visual Studio installation: $installationPath"

          Get-ChildItem (Join-Path $installationPath 'VC\Tools\MSVC') -Directory |
            Select-Object -ExpandProperty Name

          Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\Include" -Directory |
            Select-Object -ExpandProperty Name

      - name: Ensure WDK for x86/ARM32 driver build
        if: ${{ matrix.arch == 'x86' || matrix.arch == 'ARM' }}
        shell: pwsh
        run: ./scripts/nuget/Ensure-LdkWdk.ps1 -WindowsSdkVersion '10.0.22621.0' -RequiredPlatforms '${{ matrix.arch }}'

      - name: Build library
        shell: pwsh
        run: |
          $sdkVersion = '10.0.22621.0'
          $arch = '${{ matrix.arch }}'
          $config = '${{ matrix.config }}'
          $buildDir = "build_vs2019_${arch}_$config"
          $platformByArch = @{
            x86 = 'Win32'
            x64 = 'x64'
            ARM = 'ARM'
            ARM64 = 'ARM64'
          }
          $platform = $platformByArch[$arch]
          if ($arch -eq 'ARM') {
            $platform = "$platform,version=$sdkVersion"
          }

          cmake `
            -S . `
            -B $buildDir `
            -G "Visual Studio 17 2022" `
            -A $platform `
            -T "v142,host=x64" `
            "-DLDK_WDK_VERSION=$sdkVersion" `
            "-DCMAKE_SYSTEM_VERSION=$sdkVersion" `
            "-DCMAKE_VS_WINDOWS_TARGET_PLATFORM_VERSION=$sdkVersion" `
            "-DCMAKE_VS_WINDOWS_TARGET_PLATFORM_VERSION_MAXIMUM=$sdkVersion" `
            "-DCMAKE_C_FLAGS=/MP" `
            "-DCMAKE_CXX_FLAGS=/MP"
          if ($LASTEXITCODE -ne 0) {
            throw "CMake configure failed with exit code $LASTEXITCODE."
          }

          cmake --build $buildDir --config $config --target Ldk --parallel
          if ($LASTEXITCODE -ne 0) {
            throw "CMake build failed with exit code $LASTEXITCODE."
          }

      - name: Build test driver
        shell: pwsh
        working-directory: test
        run: |
          $sdkVersion = '10.0.22621.0'
          $arch = '${{ matrix.arch }}'
          $config = '${{ matrix.config }}'
          $buildDir = "build_vs2019_${arch}_$config"
          $platformByArch = @{
            x86 = 'Win32'
            x64 = 'x64'
            ARM = 'ARM'
            ARM64 = 'ARM64'
          }
          $platform = $platformByArch[$arch]
          if ($arch -eq 'ARM') {
            $platform = "$platform,version=$sdkVersion"
          }

          cmake `
            -S . `
            -B $buildDir `
            -G "Visual Studio 17 2022" `
            -A $platform `
            -T "v142,host=x64" `
            "-DLDK_WDK_VERSION=$sdkVersion" `
            "-DCMAKE_SYSTEM_VERSION=$sdkVersion" `
            "-DCMAKE_VS_WINDOWS_TARGET_PLATFORM_VERSION=$sdkVersion" `
            "-DCMAKE_VS_WINDOWS_TARGET_PLATFORM_VERSION_MAXIMUM=$sdkVersion" `
            "-DCMAKE_C_FLAGS=/MP" `
            "-DCMAKE_CXX_FLAGS=/MP"
          if ($LASTEXITCODE -ne 0) {
            throw "CMake configure failed with exit code $LASTEXITCODE."
          }

          cmake --build $buildDir --config $config --parallel
          if ($LASTEXITCODE -ne 0) {
            throw "CMake build failed with exit code $LASTEXITCODE."
          }

  build-vs2026:
    name: VS2026/v145 ${{ matrix.arch }} ${{ matrix.config }}
    runs-on: windows-2025-vs2026
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, x64, ARM64]
        config: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show VS2026 toolchain
        shell: pwsh
        run: |
          cmake --version

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installationPath = & $vswhere -latest -products * -property installationPath
          Write-Host "Visual Studio installation: $installationPath"

          Get-ChildItem (Join-Path $installationPath 'VC\Tools\MSVC') -Directory |
            Select-Object -ExpandProperty Name

          Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\Include" -Directory |
            Select-Object -ExpandProperty Name

      - name: Ensure WDK for VS2026 image
        shell: pwsh
        run: ./scripts/nuget/Ensure-LdkWdk.ps1 -WindowsSdkVersion '10.0.26100.0'

      - name: Ensure WDK for VS2026 x86 driver build
        if: ${{ matrix.arch == 'x86' }}
        shell: pwsh
        run: ./scripts/nuget/Ensure-LdkWdk.ps1 -WindowsSdkVersion '10.0.22621.0' -RequiredPlatforms x86

      - name: Build library
        shell: pwsh
        run: |
          $sdkVersion = '10.0.26100.0'
          $arch = '${{ matrix.arch }}'
          $config = '${{ matrix.config }}'
          $buildDir = "build_vs2026_${arch}_$config"
          $platformByArch = @{
            x86 = 'Win32'
            x64 = 'x64'
            ARM64 = 'ARM64'
          }
          $platform = $platformByArch[$arch]

          cmake `
            -S . `
            -B $buildDir `
            -G "Visual Studio 18 2026" `
            -A $platform `
            -T host=x64 `
            "-DCMAKE_SYSTEM_VERSION=$sdkVersion" `
            "-DCMAKE_VS_WINDOWS_TARGET_PLATFORM_VERSION=$sdkVersion" `
            "-DCMAKE_VS_WINDOWS_TARGET_PLATFORM_VERSION_MAXIMUM=$sdkVersion" `
            "-DCMAKE_C_FLAGS=/MP" `
            "-DCMAKE_CXX_FLAGS=/MP"
          if ($LASTEXITCODE -ne 0) {
            throw "CMake configure failed with exit code $LASTEXITCODE."
          }

          cmake --build $buildDir --config $config --target Ldk --parallel
          if ($LASTEXITCODE -ne 0) {
            throw "CMake build failed with exit code $LASTEXITCODE."
          }

      - name: Build test driver
        shell: pwsh
        working-directory: test
        run: |
          $sdkVersion = '10.0.26100.0'
          $arch = '${{ matrix.arch }}'
          $config = '${{ matrix.config }}'
          $buildDir = "build_vs2026_${arch}_$config"
          $platformByArch = @{
            x86 = 'Win32'
            x64 = 'x64'
            ARM64 = 'ARM64'
          }
          $platform = $platformByArch[$arch]

          cmake `
            -S . `
            -B $buildDir `
            -G "Visual Studio 18 2026" `
            -A $platform `
            -T host=x64 `
            "-DCMAKE_SYSTEM_VERSION=$sdkVersion" `
            "-DCMAKE_VS_WINDOWS_TARGET_PLATFORM_VERSION=$sdkVersion" `
            "-DCMAKE_VS_WINDOWS_TARGET_PLATFORM_VERSION_MAXIMUM=$sdkVersion" `
            "-DCMAKE_C_FLAGS=/MP" `
            "-DCMAKE_CXX_FLAGS=/MP"
          if ($LASTEXITCODE -ne 0) {
            throw "CMake configure failed with exit code $LASTEXITCODE."
          }

          cmake --build $buildDir --config $config --parallel
          if ($LASTEXITCODE -ne 0) {
            throw "CMake build failed with exit code $LASTEXITCODE."
          }
