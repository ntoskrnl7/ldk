name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.arch }} ${{ matrix.config }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, x64, ARM, ARM64]
        config: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build library
        shell: cmd
        run: build.bat . ${{ matrix.arch }} ${{ matrix.config }}

      - name: Build test driver
        if: ${{ matrix.arch == 'x64' || matrix.arch == 'ARM64' }}
        shell: cmd
        working-directory: test
        run: ..\build.bat . ${{ matrix.arch }} ${{ matrix.config }}

      - name: Stage release artifact
        if: ${{ matrix.config == 'Release' }}
        shell: pwsh
        run: |
          $stage = Join-Path $env:RUNNER_TEMP "ldk-${{ matrix.arch }}"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item -Recurse -Path "include" -Destination (Join-Path $stage "include")
          New-Item -ItemType Directory -Force -Path (Join-Path $stage "lib") | Out-Null
          Copy-Item -Recurse -Path "lib\${{ matrix.arch }}" -Destination (Join-Path $stage "lib")
          Copy-Item -Path "README.md", "LICENSE" -Destination $stage
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          Compress-Archive -Path (Join-Path $stage "*") -DestinationPath "dist\ldk-${{ matrix.arch }}.zip" -Force

      - name: Upload release artifact
        if: ${{ matrix.config == 'Release' }}
        uses: actions/upload-artifact@v7
        with:
          name: ldk-${{ matrix.arch }}
          path: dist/ldk-${{ matrix.arch }}.zip

  build-vs2026:
    name: VS2026 ${{ matrix.arch }} Debug
    runs-on: windows-2025-vs2026
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, ARM64]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show VS2026 toolchain
        shell: pwsh
        run: |
          cmake --version

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installationPath = & $vswhere -latest -products * -property installationPath
          Write-Host "Visual Studio installation: $installationPath"

          Get-ChildItem (Join-Path $installationPath 'VC\Tools\MSVC') -Directory |
            Select-Object -ExpandProperty Name

          Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\Include" -Directory |
            Select-Object -ExpandProperty Name

      - name: Install WDK for VS2026 image
        shell: pwsh
        run: |
          function Find-NtDdk {
            $roots = @(
              "${env:ProgramFiles(x86)}\Windows Kits\10\Include",
              "${env:ProgramFiles}\Windows Kits\10\Include"
            )

            foreach ($root in $roots) {
              if (Test-Path $root) {
                $match = Get-ChildItem -Path $root -Filter ntddk.h -Recurse -File -ErrorAction SilentlyContinue |
                  Sort-Object FullName |
                  Select-Object -Last 1
                if ($match) {
                  return $match
                }
              }
            }

            return $null
          }

          $ntddk = Find-NtDdk
          if (-not $ntddk) {
            Write-Host "WDK ntddk.h was not found on the VS2026 image. Installing WDK 10.0.26100 with WinGet."
            winget install `
              --exact `
              --id Microsoft.WindowsWDK.10.0.26100 `
              --source winget `
              --silent `
              --accept-package-agreements `
              --accept-source-agreements `
              --disable-interactivity

            if ($LASTEXITCODE -ne 0) {
              throw "WDK installation failed with exit code $LASTEXITCODE."
            }
          }

          $ntddk = Find-NtDdk
          if (-not $ntddk) {
            throw "WDK ntddk.h was not found after WDK installation."
          }

          Write-Host "Found WDK ntddk.h: $($ntddk.FullName)"

      - name: Build library
        shell: pwsh
        run: |
          $sdkVersion = '10.0.26100.0'
          $arch = '${{ matrix.arch }}'
          $buildDir = "build_vs2026_$arch"

          cmake `
            -S . `
            -B $buildDir `
            -G "Visual Studio 18 2026" `
            -A $arch `
            -T host=x64 `
            "-DCMAKE_SYSTEM_VERSION=$sdkVersion" `
            "-DCMAKE_VS_WINDOWS_TARGET_PLATFORM_VERSION=$sdkVersion" `
            "-DCMAKE_VS_WINDOWS_TARGET_PLATFORM_VERSION_MAXIMUM=$sdkVersion" `
            "-DCMAKE_C_FLAGS=/MP" `
            "-DCMAKE_CXX_FLAGS=/MP"
          if ($LASTEXITCODE -ne 0) {
            throw "CMake configure failed with exit code $LASTEXITCODE."
          }

          cmake --build $buildDir --config Debug --target Ldk --parallel
          if ($LASTEXITCODE -ne 0) {
            throw "CMake build failed with exit code $LASTEXITCODE."
          }

      - name: Build test driver
        shell: pwsh
        working-directory: test
        run: |
          $sdkVersion = '10.0.26100.0'
          $arch = '${{ matrix.arch }}'
          $buildDir = "build_vs2026_$arch"

          cmake `
            -S . `
            -B $buildDir `
            -G "Visual Studio 18 2026" `
            -A $arch `
            -T host=x64 `
            "-DCMAKE_SYSTEM_VERSION=$sdkVersion" `
            "-DCMAKE_VS_WINDOWS_TARGET_PLATFORM_VERSION=$sdkVersion" `
            "-DCMAKE_VS_WINDOWS_TARGET_PLATFORM_VERSION_MAXIMUM=$sdkVersion" `
            "-DCMAKE_C_FLAGS=/MP" `
            "-DCMAKE_CXX_FLAGS=/MP"
          if ($LASTEXITCODE -ne 0) {
            throw "CMake configure failed with exit code $LASTEXITCODE."
          }

          cmake --build $buildDir --config Debug --parallel
          if ($LASTEXITCODE -ne 0) {
            throw "CMake build failed with exit code $LASTEXITCODE."
          }
